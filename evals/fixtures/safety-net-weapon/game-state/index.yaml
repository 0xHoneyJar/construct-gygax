game: "Safety Net Weapon Test Fixture"
tradition: custom
description: "Custom system encoding the MtG Mulligan pattern in TTRPG form. A reroll safety net (free reroll on failed checks) with no friction becomes the optimal build strategy. Players maximize Luck (reroll tokens) and minimize skill bonuses, weaponizing the frustration reducer into a primary success path."
