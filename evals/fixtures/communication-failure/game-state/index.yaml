game: "Communication Failure Test Fixture"
tradition: custom
description: "Custom system encoding the Fall from Heaven hidden-interaction pattern -- mechanics whose effects are not communicated to players. Blessings secretly reduce encounter rates, crafting skill unlocks hidden vendor discounts, reputation triggers invisible world events. Players interact with these systems constantly but cannot make informed decisions because the feedback loops are invisible."
