id: divine-favor
name: "Divine Favor"
type: resources
description: "A resource generated by the blessing system. Players can see their Divine Favor count. What players cannot see: Divine Favor above 10 secretly reduces random encounter frequency by 30%, and above 20 reduces it by 60%. The resource description says 'the gods smile upon you' without mentioning any mechanical effect beyond the blessing's stated benefits."
tradition: custom
tags: [resource, divine, hidden-effect, encounter-rate]
depends_on:
  - mechanics/blessing-system.yaml
affects:
  - mechanics/hidden-encounter-reduction.yaml
created_by: attune
created_at: "2026-04-19T00:00:00Z"
last_modified_by: attune
last_modified_at: "2026-04-19T00:00:00Z"

economy:
  generation: "1-3 per blessing performed (player-visible)"
  consumption: "Some blessings cost Divine Favor (player-visible)"
  decay: "1 per long rest (player-visible)"
  pool_type: regenerating

visible_effects:
  - "Fuel for certain blessing abilities (documented)"
  - "Visual aura at 10+ favor (cosmetic, documented)"

hidden_effects:
  threshold_10:
    effect: "Random encounter frequency reduced by 30%"
    documented: false
    player_observable: "Fewer random encounters, but randomness makes the pattern hard to detect"
  threshold_20:
    effect: "Random encounter frequency reduced by 60%"
    documented: false
    player_observable: "Noticeably fewer encounters, but players may attribute this to luck or GM fiat"

communication_gap:
  resource_description_says: "Divine Favor represents the attention of the gods. Accumulate it through acts of devotion."
  resource_description_omits: "All information about encounter rate reduction"
  player_decision_impact: "A player managing Divine Favor has no reason to maintain it above the cost of their next blessing ability. The hidden threshold incentivizes hoarding, but the player cannot know this."
