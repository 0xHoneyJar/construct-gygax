id: rest-caster-class
name: "Rest Caster (Warlock-like)"
type: progression
description: "Arcane caster with short-rest recovery. Intended design: moderate per-encounter power with rapid recovery. Actual outcome: unlimited total power through rest-chaining. The class is not overpowered per encounter -- it's overpowered per day because the day has no resource ceiling."
