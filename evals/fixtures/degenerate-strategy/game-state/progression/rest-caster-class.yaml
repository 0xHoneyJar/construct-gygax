intended_vs_actual:
  intended:
    per_encounter_budget: "2-5 spell slots"
    encounters_per_day: "6-8"
    total_daily_casting: "12-40 spells (spread across encounters, moderate power each)"
    strategy: "Conserve slots, use cantrips when possible, nova only on boss fights"
  actual:
    per_encounter_budget: "ALL spell slots (full recovery between each)"
    encounters_per_day: "irrelevant"
    total_daily_casting: "unlimited"
    strategy: "Rest to full. Dump everything round 1. Rest again."

scaling_notes:
  - "Per-encounter slots are LOW (2-5). This is intentional -- it's a per-encounter class."
  - "But unlimited recovery means per-encounter = per-everything."
  - "Quicken Spell at level 5 enables 2 spells per round, doubling nova output."
  - "By level 9, round 1 nova can end most CR-appropriate encounters."
  - "By level 15, round 1 nova can end encounters 2-3 CR above party level."
