game: "Dominant Build Collapse Test Fixture"
tradition: roguelike
description: "A roguelike where the Vampire Lifesteal build creates an unbreakable feedback loop (damage -> heal -> survive -> more damage) that trivializes all content. Finding 2-3 core items in the first 3 floors guarantees a win on any seed. Run-to-run variance collapses from 'which build will I discover?' to 'did I find the lifesteal items?'"
