id: build-diversity-collapse
name: "Build Diversity vs Dominant Strategy"
type: tensions
description: "The tension between offering multiple viable build paths (roguelike replayability) and the Vampire Lifesteal build's overwhelming dominance (which collapses all runs into the same strategy). The item system provides the ingredients for diversity, but one recipe is so much better than the others that experienced players never cook anything else."
tradition: roguelike
tags: [balance, diversity, degenerate, replayability]
depends_on: [resources/health-pool.yaml, mechanics/item-synergy.yaml, entities/build-archetypes.yaml]
affects: []
created_by: attune
created_at: "2026-04-19T00:00:00Z"
last_modified_by: attune
last_modified_at: "2026-04-19T00:00:00Z"

intent:
  summary: "Each run should feel unique based on which items are discovered, encouraging build experimentation and adaptation"
  rationale: "Roguelike replayability depends on run variance. If every run converges on the same build, the game has one experience, not many."
  set_by: attune
  set_at: "2026-04-19T00:00:00Z"
  non_negotiable: true

poles:
  a:
    name: "Build Diversity"
    description: "Six archetypes with distinct playstyles, trade-offs, and skill expression. The item system supports emergent builds through random drops. Each run should discover a different optimal path."
    supported_by: [entities/build-archetypes.yaml, resources/item-drops.yaml]
  b:
    name: "Dominant Strategy"
    description: "Vampire Lifesteal's uncapped AoE healing creates an unbreakable feedback loop. No other build approaches its win rate. Experienced players force it every run or restart."
    supported_by: [mechanics/item-synergy.yaml, stats/player-combat-stats.yaml]

health: b-dominant
health_notes: "The dominant build has collapsed run diversity. Experienced players report all runs feeling identical: find lifesteal, equip lifesteal, win. The five non-dominant builds exist only in the early game as 'backup plans until lifesteal items appear.' The roguelike's core value proposition -- every run is different -- is false. Every successful run is the same."

replayability_impact:
  first_10_runs: "High engagement -- discovering builds, experimenting, learning enemy patterns."
  runs_11_30: "Declining -- Vampire discovered, alternatives feel weak."
  runs_30_plus: "Low -- every run is 'restart until lifesteal, then auto-win.' Decision-making ends at floor 3."

degenerate_indicators:
  optimal_strategy: "Force Vampire Lifesteal every run"
  counterplay_available: false
  skill_expression: "minimal after build is assembled"
  run_variance: "near-zero for experienced players"
  discovery_time: "5-10 runs"
  note: "The game effectively has one run. After discovery, the roguelike becomes a slot machine for starting items."

notes:
  - "Roguelike build diversity is the genre's replayability engine. One dominant build is an extinction event for replay value."
  - "The Binding of Isaac handles this by making broken combos rare AND making most items modify the experience qualitatively, not just quantitatively."
  - "Fix priority: cap the lifesteal interaction, add costs to lifesteal items, or create anti-synergy mechanics that punish overspecialization."
  - "The design is 85% of the way to working. Five builds are well-designed. Fixing one interaction saves the entire system."
