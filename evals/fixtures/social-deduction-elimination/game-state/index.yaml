game: "First-Night Elimination Test Fixture"
tradition: social-deduction
description: "A social deduction game where the first-night kill eliminates a player before they've taken any meaningful action. The eliminated player watches for 30-45 minutes. With 8 players, each player has a 12.5% chance of immediate elimination and a 25% chance of elimination before their first real deduction opportunity."
