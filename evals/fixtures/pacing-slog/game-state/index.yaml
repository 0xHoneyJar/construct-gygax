game: "Pacing Slog Test Fixture"
tradition: d20
description: "d20 campaign structure encoding the Fall from Heaven long-game pattern -- a main quest requiring 12 MacGuffins, each behind a full dungeon, with no shortcuts, alternative victory conditions, or progress acceleration. Session-to-session advancement is imperceptible, and the narrative arc has no internal milestones or escalation."
created_at: "2026-04-19T00:00:00Z"
last_modified_at: "2026-04-19T00:00:00Z"

design_parameters:
  target_session_length: long
  target_audience: intermediate
  target_variance: low
  target_lethality: moderate
  target_prep: high
  target_player_count: standard

entity_count:
  stats: 1
  resources: 2
  mechanics: 2
  progression: 1
  entities: 1
  tensions: 1

