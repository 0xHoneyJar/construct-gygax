id: constitution
name: "Constitution"
type: stats
description: "Physical toughness. Determines HP and Fortitude saves. Monk has d8 hit die (below martial standard of d10) and must be in melee range, making CON critical for survival. Fourth stat competing for a budget that supports two."
tradition: d20
tags: [survival, hp, mad-stat]
depends_on: []
affects: [mechanics/unarmed-strike.yaml]
created_by: attune
created_at: "2026-04-19T00:00:00Z"
last_modified_by: attune
last_modified_at: "2026-04-19T00:00:00Z"

range:
  min: 3
  max: 20
  typical: 10-16
  modifier_formula: "floor((value - 10) / 2)"

point_buy_cost:
  8: 0
  10: 2
  12: 4
  14: 6
  16: 10
  18: 16

used_by:
  - "HP per level (+modifier per hit die)"
  - "Fortitude saves (+modifier)"
  - "Concentration checks for ki abilities"

notes:
  - "Monk is a melee class on a d8 hit die. CON 10 means 4.5 HP/level. Fighter with CON 14 gets 7.5 HP/level on a d10."
  - "Low CON + low AC (from split DEX/WIS) = fragile melee combatant"
  - "CON is the stat most often dumped, creating a survivability crisis at mid-levels"
