notes:
  - "Ki DCs are WIS-dependent. Low WIS means Stunning Fist never lands."
  - "At WIS 12 (typical MAD compromise), Stunning Fist DC is 11 + half level. Enemies save on 10+ at most levels."
  - "WIS also contributes to AC, creating a double penalty when it's low: fewer ki hits AND lower AC"
