id: dexterity
name: "Dexterity"
type: stats
description: "Agility and reflexes. Monk's primary defensive stat -- adds to AC (unarmored), Reflex saves, and initiative. Competes directly with STR and WIS for point-buy budget."
tradition: d20
tags: [combat, defense, mad-stat]
depends_on: []
affects: [mechanics/unarmored-defense.yaml, mechanics/unarmed-strike.yaml]
created_by: attune
created_at: "2026-04-19T00:00:00Z"
last_modified_by: attune
last_modified_at: "2026-04-19T00:00:00Z"

range:
  min: 3
  max: 20
  typical: 10-16
  modifier_formula: "floor((value - 10) / 2)"

point_buy_cost:
  8: 0
  10: 2
  12: 4
  14: 6
  16: 10
  18: 16

used_by:
  - "Unarmored AC (+modifier, replaces armor)"
  - "Reflex saves (+modifier)"
  - "Initiative (+modifier)"
  - "Ranged attack rolls (secondary)"

notes:
  - "Monk MUST prioritize DEX -- without armor, AC depends entirely on DEX + WIS"
  - "At DEX 14 (typical MAD allocation), AC bonus is only +2. Fighter in full plate gets +8."
  - "DEX is non-negotiable but every point here is a point not in STR or WIS"
