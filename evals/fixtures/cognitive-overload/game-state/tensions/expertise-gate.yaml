id: expertise-gate
name: "Expertise-Gated Enjoyment"
type: tensions
description: "The gap between the experience of a veteran who understands the subsystems and a newcomer who does not. Veterans can make informed class selections and enjoy the mechanical depth. Newcomers face a wall of incomprehensible jargon and either disengage or make blind choices they may regret for an entire campaign."
tradition: d20
tags: [accessibility, expertise, newcomer-experience, veteran-experience]
depends_on:
  - mechanics/description-opacity.yaml
  - entities/class-roster.yaml
affects: []
created_by: attune
created_at: "2026-04-19T00:00:00Z"
last_modified_by: attune
last_modified_at: "2026-04-19T00:00:00Z"

intent:
  summary: "The system should be engaging for players of all experience levels"
  rationale: "A TTRPG that is only enjoyable after 100+ hours of system mastery has a recruitment problem. Most groups include a mix of experience levels."
  set_by: attune
  set_at: "2026-04-19T00:00:00Z"
  non_negotiable: false

poles:
  a:
    name: "Veteran Depth"
    description: "Experienced players who know all 52 subsystems can theorycraft, optimize, and enjoy deep mechanical engagement."
    supported_by: [mechanics/class-subsystems.yaml]
  b:
    name: "Newcomer Accessibility"
    description: "New players can understand their options, make informed choices, and have fun from session 1."
    supported_by: []

health: a-dominant
health_notes: "The system serves veterans exclusively. A newcomer's first 10-20 sessions are spent discovering what their class actually does -- often after making irrevocable build decisions based on flavor text that didn't communicate mechanical reality. The system provides no onboarding path, no recommended beginner classes, and no way to course-correct a poor initial choice."

regret_pattern:
  - "Newcomer reads 'The harmonic convergence of inscribed sigils' and thinks it sounds cool"
  - "Newcomer picks Runesmith without understanding Etch Stacks are a resource management minigame"
  - "By session 3, newcomer realizes they hate resource management but their class is built around it"
  - "Newcomer cannot respec without GM intervention and party disruption"
  - "Newcomer is stuck in a mechanical experience they didn't choose -- they chose a fantasy they liked"
