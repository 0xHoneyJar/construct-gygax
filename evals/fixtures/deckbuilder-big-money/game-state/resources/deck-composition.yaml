id: deck-composition
name: "Deck Composition"
type: resources
description: "The player's deck, comprising treasure cards, action cards, and victory point cards. Big Money keeps the deck lean (mostly treasures + starting cards + VP cards). Engine strategies dilute the deck with action cards that may or may not appear in useful combinations. Deck dilution is the engine's hidden cost -- more cards means less consistency."
tradition: deckbuilder
tags: [deck, composition, dilution]
