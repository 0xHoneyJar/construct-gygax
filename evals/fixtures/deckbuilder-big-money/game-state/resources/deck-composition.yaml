  note: "Engine strategies draw 3.3 more 'dead' hands (hands that can't buy anything useful). Each dead hand is a lost turn."

notes:
  - "The deck IS the resource. Big Money treats it as a simple accumulator. Engine strategies treat it as a machine."
  - "The problem: the machine takes too long to build and runs too few cycles before the game ends."
  - "Fix: extend game length, add deck thinning to starting abilities, or make engine cards cheaper."
