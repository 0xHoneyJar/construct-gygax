id: fighter-class
name: "Fighter (Reactive Role)"
type: progression
description: "Martial class with full BAB, d10 hit die, all armor/weapon proficiencies, and bonus feats. Optimized for dealing damage reactively. No proactive threat prevention, no resource-gated abilities, no out-of-combat utility. The best at an inferior category of action."
tradition: d20
tags: [martial, reactive, linear-scaling]
