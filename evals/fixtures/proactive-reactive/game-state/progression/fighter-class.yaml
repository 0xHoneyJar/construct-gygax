capability_comparison:
  fighter_can:
    - "Deal weapon damage to a single target in melee range"
    - "Take hits (high HP, heavy armor)"
    - "Use combat maneuvers (trip, disarm, grapple)"
  fighter_cannot:
    - "Prevent encounters before they start"
    - "Control battlefield geometry"
    - "Remove threats without killing them"
    - "Fly, teleport, or alter terrain"
    - "Affect multiple enemies simultaneously (no AoE)"
    - "Provide out-of-combat problem solving"

scaling_notes:
  - "BAB +1/level (best). But BAB only affects hit chance -- not threat prevention."
  - "Bonus feats every 2 levels. But feats are static bonuses (+1 to hit, +2 damage). No qualitative jumps."
  - "DPR scales linearly: ~10 at 1, ~35 at 10, ~65 at 20. Respectable but irrelevant when prevention exists."
  - "The fighter is the best at dealing damage. But dealing damage is the wrong solution when prevention is available."
  - "No feature at any level grants proactive capability. The progression makes you better at the wrong thing."
