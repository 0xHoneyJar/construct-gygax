codzilla_analysis:
  casting: "Full 9-level divine. Prepares from entire list daily. No spellbook limitation."
  martial: "Medium BAB (3/4), heavy armor, shield, martial weapons via War domain."
  buff_stacking: "Divine Power (4th) grants full BAB + bonus damage. Righteous Might (5th) grants size increase + STR/CON. Together = fighter-equivalent melee + full casting."
  cost: "2 spell slots to become a better fighter than the fighter, while retaining spellcasting."

scaling_notes:
  - "Level 1-4: Heal bot with moderate melee. Fighter is the clear combatant."
  - "Level 5-8: Proactive spells emerge (Wind Wall, Searing Light). Fighter starts losing relevance."
  - "Level 9-12: CoDzilla online. Divine Power + Righteous Might = fighter + full caster in one body."
  - "Level 13-16: Blade Barrier, Antilife Shell, Word of Recall. Fighter is a bodyguard for a god."
  - "Level 17-20: Miracle, Mass Heal, Gate. Fighter's contribution is statistically insignificant."
