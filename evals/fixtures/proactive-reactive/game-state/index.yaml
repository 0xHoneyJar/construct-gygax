tradition: d20
description: "Simplified d20 system encoding the proactive/reactive role asymmetry. Casters prevent threats in one action; martials react to threats over many rounds. Prevention is categorically superior to reaction. The CoDzilla pattern: a caster that can also fight, making the martial redundant."
