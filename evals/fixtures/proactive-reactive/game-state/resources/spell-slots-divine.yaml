id: spell-slots-divine
name: "Divine Spell Slots"
type: resources
description: "Daily spell capacity for Cleric. Full 9-level progression. Each slot can be spent on PROACTIVE prevention (Wall of Stone, Blade Barrier) or REACTIVE support (Heal, Cure). The mere existence of proactive options makes reactive ones suboptimal."
tradition: d20
tags: [caster, daily, proactive]
depends_on: [progression/cleric-class.yaml]
affects: [mechanics/divine-casting.yaml]
created_by: attune
created_at: "2026-04-19T00:00:00Z"
last_modified_by: attune
last_modified_at: "2026-04-19T00:00:00Z"

pool:
  min: 0
  max_by_level:
    1: 3
    5: 10
    10: 20
    15: 30
    20: 38
  recovery:
    trigger: long-rest
    amount: full
  note: "Clerics prepare from the entire spell list daily. No spellbook limitation."

proactive_vs_reactive_value:
  example_level_9:
    proactive_option: "Wall of Stone (5th level) -- prevents all melee damage from blocked enemies. 1 action, 1 slot."
    reactive_option: "Heal (6th level) -- restores 110 HP after damage taken. 1 action, 1 higher slot."
    analysis: "Preventing 110 damage costs less (lower slot) and no HP is ever lost. Prevention > reaction."
  example_level_13:
    proactive_option: "Antilife Shell (5th level) -- no melee creature can approach. Entire encounter negated."
    reactive_option: "Mass Cure Wounds (5th level) -- heals 3d8+5 to 6 creatures. ~57 HP total."
    analysis: "Same slot level. One prevents ALL damage, the other patches partial damage. Not close."

depletion_consequence: "Must rely on martial combat (d8 HD, medium armor, simple/martial weapons). Still more capable than a depleted wizard."
pressure_rating: low

notes:
  - "Cleric spell list contains BOTH proactive and reactive spells. Optimizer always picks proactive."
  - "Full spell list access daily means the Cleric can always prepare the optimal counter."
  - "The fighter has no equivalent resource. Every fighter action is reactive."
