scaling_notes:
  - "BAB scales +1/2 levels (worst in system). Irrelevant because spells don't use BAB."
  - "New spell level every 2 class levels. Each tier is a QUALITATIVE power jump, not just bigger numbers."
  - "Level 1-4: damage dealer (Burning Hands, Magic Missile). Comparable to fighter."
  - "Level 5-8: battlefield control (Fireball, Fly, Haste). Fighter starts falling behind."
  - "Level 9-12: reality alteration (Wall of Force, Teleport, Dominate). Fighter is a bodyguard."
  - "Level 13-16: godlike power (Maze, Prismatic Wall, Simulacrum). Fighter's agency is deleted."
  - "Level 17-20: wish-level reality rewriting. Fighter is a tool, not a peer."
  - "The exponential curve is in CAPABILITIES, not just DPR. A fighter's DPR doesn't matter when the wizard prevents the fight."
