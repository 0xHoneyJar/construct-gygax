scaling_notes:
  - "BAB scales +1/level (linear). Best BAB progression in the system."
  - "Extra attacks at BAB +6/+11/+16 but each at -5 cumulative. Diminishing returns."
  - "Bonus feats provide static +1/+2 bonuses or unlock fixed-value maneuvers."
  - "No resource-gated nova abilities. Consistent but predictable damage output."
  - "DPR curve: roughly linear from level 1 to 20. No exponential breakpoints."
  - "At high levels, damage output becomes IRRELEVANT when casters can prevent combat entirely."
