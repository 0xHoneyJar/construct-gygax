pool:
  min: 0
  max_by_level:
    1: 2     # 2 first-level slots
    3: 4     # 3 first + 1 second
    5: 7     # 3+2+2
    7: 11    # 3+3+2+1+1+1
    10: 16
    15: 25
    20: 34
  recovery:
    trigger: long-rest
