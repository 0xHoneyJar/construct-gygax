scaling_notes:
  - "Feat slots at levels 1, 3, 6, 9, 12, 15, 18 = 7 total over 20 levels"
  - "Each feat slot is ~14% of total build customization (1/7)"
  - "HP grows every level; feats are granted every 3 levels -- feats are 3x rarer than HP gains"
  - "A feat that provides the equivalent of <1 level of HP growth is a poor exchange for a slot gained only every 3 levels"
