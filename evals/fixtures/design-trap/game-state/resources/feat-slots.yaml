id: feat-slots
name: "Feat Slots"
type: resources
description: "Limited character-build resource granted every 3 levels. Each slot is consumed permanently by selecting a feat. Scarcity makes each selection a high-stakes decision -- a wasted feat slot cannot be recovered."
tradition: d20
tags: [build-resource, feats, scarcity]
depends_on:
  - progression/character-progression.yaml
affects:
  - entities/feat-toughness.yaml
  - entities/feat-dodge.yaml
created_by: attune
created_at: "2026-04-19T00:00:00Z"
last_modified_by: attune
last_modified_at: "2026-04-19T00:00:00Z"

economy:
  generation: "1 feat slot at level 1, then +1 every 3 levels (levels 1, 3, 6, 9, 12, 15, 18)"
  consumption: "Permanent -- selecting a feat consumes the slot irrevocably"
  pool_type: permanent-allocation
  max_by_level:
    1: 1
    3: 2
    6: 3
    9: 4
    12: 5
    15: 6
    18: 7
    20: 7

scarcity_notes:
  - "By level 10, a character has ~4 feat slots total. Each represents ~25% of build customization."
  - "Feats compete against each other for the same scarce resource."
  - "A feat that doesn't scale effectively wastes 25%+ of a character's build identity."
