type: mechanics
description: "Buy/sell mechanic with NPC shopkeepers. Fixed prices, unlimited NPC gold reserves, no supply/demand adjustment. The transmission mechanism that converts crafted items into gold without limit."
tradition: d20
tags: [economy, trade, infinite-source]
depends_on: [entities/npc-shopkeeper.yaml]
affects: [resources/gold.yaml]
created_by: attune
