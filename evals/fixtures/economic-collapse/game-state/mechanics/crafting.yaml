id: crafting
name: "Crafting"
type: mechanics
description: "Item creation mechanic. Players convert cheap raw materials into finished goods worth substantially more. Low DC check with no cooldown, no daily limit, and negligible failure penalty. The core engine of the hyperinflationary loop."
tradition: d20
tags: [crafting, economy, exploit-vector]
depends_on: [stats/crafting-skill.yaml, resources/raw-materials.yaml]
affects: [mechanics/npc-trade.yaml, resources/gold.yaml]
created_by: attune
created_at: "2026-04-19T00:00:00Z"
last_modified_by: attune
last_modified_at: "2026-04-19T00:00:00Z"

trigger: "Player declares crafting action (no action economy cost outside combat)"
cost:
  - resource: resources/raw-materials.yaml
    amount: "1-3 units (5-60 gp in materials)"

resolution:
  method: d20-roll
  stat: stats/crafting-skill.yaml
  dc: "10 (basic items) / 15 (uncommon items)"
  success: "Create finished item (list value 100-400 gp)"
  failure: "Lose 50% of materials. May retry immediately."

interactions:
  - "No daily limit on crafting attempts"
  - "No time cost per item in downtime (1 item per downtime day, but downtime is freely available)"
  - "Failed crafts salvage half the materials, so even failure costs only 10-30 gp"
  - "Profit per successful craft: 40-340 gp (material cost 5-60 gp, sale value 50-200 gp at 50% list)"
  - "Expected profit per attempt including failures: ~30-180 gp"
  - "A character with Crafting Skill 10+ succeeds on DC 10 items automatically"

loop_analysis:
  input: "5-60 gp in raw materials"
  output: "50-200 gp from NPC sale"
  net: "+30 to +180 gp per cycle"
  bottleneck: "None. Materials always available, NPC always buys, no cooldown."
  escalation: "Profit compounds. Excess gold buys more materials for more crafting."
