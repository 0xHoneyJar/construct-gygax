expected_absent:
  - skill: augury
    layer: resolution
    severity: Critical
    reason: "Combat resolution works correctly. Damage, lifesteal, and AoE calculations are all mathematically sound. The problem is in the item interaction design, not in how combat resolves."

  - skill: augury
    layer: cognitive-load
    severity: Critical
    reason: "Cognitive load is appropriate for a roguelike. The game is not hard to understand. The problem is that understanding it reveals a dominant strategy, not that the system is confusing."

  - skill: augury
    layer: pacing
    severity: Critical
    reason: "Run pacing is appropriate. Floors take the right amount of time, bosses appear at expected intervals. The failure is strategic (one build dominates), not temporal (runs take too long or too short)."
