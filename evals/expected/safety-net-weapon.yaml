    severity: Critical
    reason: "The reroll token economy itself functions correctly: tokens are generated by Luck, consumed by rerolls, and refresh per session. The economy is not broken -- the INCENTIVE it creates is broken. The problem is in what behavior the economy rewards, not in the economy's internal logic."

