expected_absent:
  - skill: augury
    layer: resolution
    severity: Critical
    reason: "The d20 resolution mechanic is standard and functional. Attack rolls, save DCs, and damage rolls all work as designed. The failure is in what actions are AVAILABLE, not in how they resolve."

  - skill: augury
    layer: progression
    severity: Critical
    reason: "Both classes progress as designed. The Cleric gains spell levels on schedule; the Fighter gains BAB and feats on schedule. The problem is that the Cleric's progression unlocks categorically superior actions, not that either progression is internally broken."

  - skill: augury
    layer: pacing
    severity: Critical
    reason: "Encounter pacing is not the issue. If anything, Cleric prevention makes encounters faster. The problem is role relevance, not session timing."
