heuristics:
  button_vs_tripwire: "Does this move activate from fiction, or can a player select it from a menu? If menu-selectable, it is not PbtA-native."
  fiction_mechanics_loop_integrity: "Does every mechanical outcome generate new fiction, or does it just adjust a number?"
  weak_hit_quality: "Do 7-9 results produce genuine forks/costs, or do they feel like 'you won but worse'?"
  required_move_presence: "Do playbooks express identity through mandatory triggers, or are all moves optional upgrades?"
  graceful_collapse_test: "If a peripheral rule is forgotten, does the game still function on the 10+/7-9/6- core?"
  arena_differentiation: "Do playbooks bypass conflict through unique arenas, or do they all engage the same conflict type with different stats?"
  underlying_model_coherence: "Is the game's underlying model (Conflict/Relating/Adventure) consistent with its moves and playbooks?"
