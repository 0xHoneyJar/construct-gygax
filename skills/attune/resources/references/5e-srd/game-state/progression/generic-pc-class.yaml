id: generic-pc-class
name: "Generic PC Class (5e Baseline)"
type: progression
description: "Abstract PC progression baseline covering proficiency bonus scaling and hit dice accumulation across all 20 levels. Not tied to a specific class."
tradition: d20
tags: [class, progression, baseline, bounded-accuracy]

progression_table:
  1:  {proficiency_bonus: 2, hit_dice_accumulated: 1, notes: "Class features begin"}
  2:  {proficiency_bonus: 2, hit_dice_accumulated: 2}
  3:  {proficiency_bonus: 2, hit_dice_accumulated: 3}
  4:  {proficiency_bonus: 2, hit_dice_accumulated: 4, notes: "Ability Score Improvement"}
  5:  {proficiency_bonus: 3, hit_dice_accumulated: 5, notes: "Proficiency bump; martial Extra Attack here"}
  6:  {proficiency_bonus: 3, hit_dice_accumulated: 6}
  7:  {proficiency_bonus: 3, hit_dice_accumulated: 7}
  8:  {proficiency_bonus: 3, hit_dice_accumulated: 8, notes: "Ability Score Improvement"}
  9:  {proficiency_bonus: 4, hit_dice_accumulated: 9}
  10: {proficiency_bonus: 4, hit_dice_accumulated: 10}
  11: {proficiency_bonus: 4, hit_dice_accumulated: 11, notes: "Casters gain 6th-level slots"}
  12: {proficiency_bonus: 4, hit_dice_accumulated: 12, notes: "Ability Score Improvement"}
  13: {proficiency_bonus: 5, hit_dice_accumulated: 13}
  14: {proficiency_bonus: 5, hit_dice_accumulated: 14}
  15: {proficiency_bonus: 5, hit_dice_accumulated: 15}
  16: {proficiency_bonus: 5, hit_dice_accumulated: 16, notes: "Ability Score Improvement"}
  17: {proficiency_bonus: 6, hit_dice_accumulated: 17, notes: "Casters gain 9th-level slots"}
  18: {proficiency_bonus: 6, hit_dice_accumulated: 18}
  19: {proficiency_bonus: 6, hit_dice_accumulated: 19, notes: "Ability Score Improvement"}
  20: {proficiency_bonus: 6, hit_dice_accumulated: 20, notes: "Capstone feature"}

proficiency_bonus_range:
  min: 2
  max: 6
  note: "Grows only 4 steps over 20 levels — deliberate bounded accuracy constraint"

hit_die_by_class_archetype:
  d6: "Sorcerer, Wizard — glass cannons"
  d8: "Bard, Cleric, Druid, Monk, Rogue, Warlock — standard"
  d10: "Fighter, Paladin, Ranger — durable martials"
  d12: "Barbarian — maximum durability"

cr_to_level_mapping:
  note: "CR ≠ Character Level. Party action economy inflates CR by ~5 levels for solo monsters."
  reference:
    cr_1: "≈ Level 3 character"
    cr_5: "≈ Level 10 character"
    cr_10: "≈ Level 16 character"
    cr_20: "≈ Level 26 character (beyond the table)"

scaling_notes:
  - "Proficiency bonus bounded to +2/+6 — prevents runaway modifier stacking"
  - "Ability scores soft-capped at 20 for PCs (modifier +5 max in normal play)"
  - "Caster power scales with spell slot level, not proficiency — quadratic feel vs. martial linear"
  - "Linear Fighter: damage grows via Extra Attack (2×, 3×, 4×) — multiplier not modifier"
  - "Quadratic Wizard: spell level 1→9 is a qualitative not quantitative change — Wish vs. Magic Missile"

intent:
  summary: "Establish bounded accuracy as the progression spine"
  rationale: "This is the stated design philosophy of 5e as documented in the DMG. Tight proficiency bonus range ensures low-CR threats remain relevant at high levels."
  set_by: attune
  set_at: "2026-04-13T00:00:00Z"
  non_negotiable: true

depends_on:
  - stats/constitution.yaml
affects:
  - resources/hit-points.yaml
  - resources/spell-slots-abstract.yaml
  - tensions/linear-fighter-quadratic-wizard.yaml
  - tensions/bounded-accuracy.yaml

