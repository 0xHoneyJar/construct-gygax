id: intelligence
name: "Intelligence"
type: stats
description: "Raw cognitive ability, reasoning, and problem-solving capacity. Used when no skill applies and raw mental aptitude is tested."
tradition: cepheus
tags: [characteristic, cognitive, core]

range:
  min: 2
  max: 15
  typical: "7 (average baseline)"
  notation_note: "Values above 9 recorded in pseudo-hexadecimal: 10=A, 11=B, 12=C, 13=D, 14=E, 15=F."

used_by:
  - "Characteristic checks when no cognitive skill applies"
  - "Modifier for certain technical and science skills"
  - "Navigation, engineering, and analysis tasks"

intent:
  summary: "Educational and cognitive capability. Education correlates with training level."
  rationale: "Intelligence and Education are distinct in Cepheus: Intelligence represents innate aptitude, Education represents accumulated formal knowledge. A low-Int, high-Edu character is a credentialed specialist who struggles to improvise; a high-Int, low-Edu character is a clever generalist who never had formal training. The distinction creates meaningful character differentiation beyond a single 'smart' score."
  set_by: attune
  set_at: "2026-04-13T00:00:00Z"
  non_negotiable: false

