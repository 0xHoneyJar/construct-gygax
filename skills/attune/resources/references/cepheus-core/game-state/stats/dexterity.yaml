id: dexterity
name: "Dexterity"
type: stats
description: "Agility, reflexes, and hand-eye coordination. Governs ranged attacks, evasion, and fine motor tasks. Contributes to life points alongside Strength and Endurance."
tradition: cepheus
tags: [characteristic, physical, core, life-points]

range:
  min: 2
  max: 15
  typical: "7 (average baseline)"
  notation_note: "Values above 9 recorded in pseudo-hexadecimal: 10=A, 11=B, 12=C, 13=D, 14=E, 15=F."

used_by:
  - "Ranged attack rolls"
  - "Stealth and evasion tasks"
  - "Fine manipulation checks"
  - "Life points calculation (Str + Dex + End)"

intent:
  summary: "Physical capability. 7 is average baseline."
  rationale: "Like all physical characteristics, Dexterity is rolled on 2D6 and averaged at 7. The 2-15 range (pseudo-hex above 9) is a legacy notation from Traveller's Universal Personality Profile, where each characteristic occupies exactly one character in the UPP string."
