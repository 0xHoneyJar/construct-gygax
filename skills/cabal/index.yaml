slug: cabal
name: "Cabal"
description: |
  Use this skill IF user invokes /cabal OR wants to playtest, stress test, find exploits, or check if players will break something.
  Produces artifacts to grimoires/gygax/cabal/.
version: 1.0.0

triggers:
  - "/cabal"
  - "playtest this"
  - "stress test"
  - "will players break this"
  - "find exploits"

capabilities:
  model_tier: opus
  danger_level: safe
  effort_hint: large
  downgrade_allowed: true
  execution_hint: sequential
  requires:
    native_runtime: false
    tool_calling: true
    thinking_traces: false
    vision: false

dependencies:
  grimoire_paths:
    - grimoires/gygax/
