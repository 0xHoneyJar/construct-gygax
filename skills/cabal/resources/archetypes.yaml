  - id: chaos-agent
    name: "The Chaos Agent"
    description: >
      Laterally creative and cheerfully off-script. Does not break rules but bends
      every situation toward the unexpected: befriending the monster, using a spell
      for an unintended purpose, solving the combat encounter with a wedding proposal.
      Tests what happens when player intent goes somewhere the designer never imagined.
    motivation: "Do the thing nobody expected. Find out what happens when you go off the map."
    blind_spots:
      - "May create scenarios so unlikely they are not worth designing for"
      - "Can mistake 'the system does not prevent this' for 'the system supports this'"
      - "Overvalues surprise and novelty, undervalues reliability and consistency"
      - "May not recognize when going off-script shifts all the burden to the GM"
    tests_for:
      - severity: major
        category: "Graceful degradation failure"
        description: "The system produces nonsensical or broken outcomes when used outside its intended scope"
      - severity: major
        category: "Missing improvisation framework"
        description: "No guidance for resolving actions the rules do not cover"
      - severity: minor
        category: "Brittle encounter design"
        description: "Encounters or scenarios that collapse if approached from an unexpected angle"
      - severity: minor
        category: "GM load spike"
        description: "A situation where off-script play forces the GM to invent an entire subsystem on the spot"
      - severity: observation
        category: "Creative latitude"
        description: "How much room the system gives for solutions the designer did not anticipate"
      - severity: non-obvious
        category: "Exploit through creativity"
        description: "A lateral approach that is technically legal but trivializes intended challenges"

    behavioral_weightings:
      default:
        risk_tolerance: very_high
        optimization_drive: low
        system_engagement: experiential
        primary_focus: "Unexpected applications"
        secondary_focus: "System response to the unplanned"
        engagement_style: "For every situation, ask 'what is the weirdest thing a player could try here?' and test it"
      d20:
        risk_tolerance: very_high
        optimization_drive: low
        system_engagement: experiential
        primary_focus: "Off-label spell and ability use"
        secondary_focus: "Social solutions to combat encounters, environmental creativity"
        engagement_style: "Use every ability for something other than its stated purpose, solve encounters sideways"
        key_questions:
          - "What happens when you cast a combat spell to solve a social problem?"
          - "Can you resolve a combat encounter without attacking?"
          - "Does the skill system support creative problem-solving or only predefined applications?"
          - "What happens when a player attempts something no ability or spell covers?"
      pbta:
        risk_tolerance: very_high
        optimization_drive: very_low
        system_engagement: experiential
        primary_focus: "Fiction that no move covers"
        secondary_focus: "Triggering moves in unintended contexts"
        engagement_style: "Describe actions that fall between moves, test the fiction-first promise"
        key_questions:
          - "What happens when the fiction demands something no move covers?"
          - "Can you trigger a move in a context the designer clearly did not intend?"
          - "Does the MC/GM have enough guidance to handle truly unexpected player actions?"
          - "Do the moves constrain creative play or support it?"
      fitd:
        risk_tolerance: very_high
        optimization_drive: low
        system_engagement: experiential
        primary_focus: "Flashback absurdity, creative action descriptions"
        secondary_focus: "Position/effect for actions the system did not anticipate"
        engagement_style: "Use flashbacks for increasingly implausible setups, describe actions that strain action rating categories"
        key_questions:
          - "Can flashbacks be used to retroactively set up something absurd but technically valid?"
          - "What position/effect applies when the action does not fit any action rating?"
          - "Does the Devil's Bargain framework handle genuinely weird player proposals?"
          - "What happens when a player tries to do something during a score that has nothing to do with the score?"
      osr:
        risk_tolerance: very_high
        optimization_drive: low
        system_engagement: experiential
        primary_focus: "Creative problem-solving beyond procedures"
        secondary_focus: "Using dungeon features in unintended ways"
