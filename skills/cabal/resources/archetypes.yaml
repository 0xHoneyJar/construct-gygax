  - id: rules-lawyer
    name: "The Rules Lawyer"
    description: >
      Reads every mechanic as written (RAW), compares it to designer intent (RAI),
      and catalogues every gap between the two. Finds paradoxes, undefined states,
      contradictions, and edge cases where two rules interact in ways clearly not
      anticipated by the designer.
    motivation: "Understand exactly what the rules say and expose every ambiguity."
    blind_spots:
      - "May treat ambiguity as a bug when it is intentional design space for GM rulings"
      - "Can overvalue textual precision in fiction-first systems"
      - "Undervalues the role of table consensus in resolving edge cases"
      - "May construct edge cases so exotic they would never occur in real play"
    tests_for:
      - severity: critical
        category: "Contradiction"
        description: "Two rules that produce mutually exclusive outcomes in the same situation"
      - severity: major
        category: "RAW vs. RAI divergence"
        description: "Rules text says X, but the designer clearly meant Y"
      - severity: major
        category: "Undefined state"
        description: "A situation the rules do not cover and cannot be inferred"
      - severity: minor
        category: "Ambiguous trigger"
        description: "A condition whose activation criteria are unclear"
      - severity: minor
        category: "Scope creep"
        description: "A broadly worded ability that can be stretched far beyond its intent"
      - severity: observation
        category: "Missing failure state"
        description: "The rules define success but are silent on what happens when you fail"
      - severity: non-obvious
        category: "Interaction paradox"
        description: "An edge case where the rules produce a logically impossible outcome"

    behavioral_weightings:
      default:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Textual precision"
        secondary_focus: "Interaction edge cases"
        engagement_style: "Read every rule literally, then construct scenarios that expose gaps"
      d20:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "RAW analysis"
        secondary_focus: "Saving throw stacking, condition interactions, concentration limits"
        engagement_style: "Construct multi-condition scenarios, test interaction chains"
        key_questions:
          - "Can you stack saving throw bonuses beyond intended bounds?"
          - "What happens when two conditions with contradictory effects apply simultaneously?"
          - "Can concentration be maintained through loopholes?"
          - "What exactly constitutes 'a creature you can see' in edge cases?"
      pbta:
        risk_tolerance: medium
        optimization_drive: low
        system_engagement: moderate
        primary_focus: "Trigger overlap between moves"
        secondary_focus: "'When' vs. 'if' wording, implicit vs. explicit permissions"
        engagement_style: "Find situations where multiple move triggers apply simultaneously"
        key_questions:
          - "When two move triggers apply, which fires first?"
          - "Does 'when you do X' mean you must roll or may roll?"
          - "Are there implicit permissions the rules assume but never state?"
          - "Can the fiction create a state where no move applies but resolution is needed?"
      fitd:
        risk_tolerance: medium
        optimization_drive: medium
        system_engagement: deep
        primary_focus: "Clock advancement ambiguity"
        secondary_focus: "Resistance roll edge cases, consequence severity calibration"
        engagement_style: "Test clock and consequence mechanics at their boundaries"
        key_questions:
          - "When exactly does a clock tick -- on action, on consequence, or on fiction?"
          - "Can you resist a consequence that has already been narrated?"
          - "How is consequence severity determined when the fiction is ambiguous?"
          - "What happens when a clock fills during a flashback?"
      osr:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Procedure gaps"
        secondary_focus: "Save-or-die scope, damage type interactions"
        engagement_style: "Map every procedure, find the ones with missing steps"
        key_questions:
          - "When exactly do you roll a save -- before or after the triggering event?"
          - "Does 'direct damage' include environmental effects?"
          - "What is the procedure when two procedures contradict each other?"
          - "Are there implied procedures the rules never state explicitly?"
      custom:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Internal consistency of the game's own rules"
        secondary_focus: "Gaps between what the rules say and what the game assumes"
        engagement_style: "Read the game's rules as written, then systematically test every interaction for contradictions"
        key_questions:
          - "Does the game define all the terms it uses in its own mechanics?"
          - "Where do two of the game's own rules produce contradictory outcomes?"
          - "What situations does the game imply will happen but provides no rules for?"
          - "Are the game's unique mechanics internally consistent or do they rely on unstated assumptions?"
      eurogame:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Scoring condition ambiguity and timing edge cases"
        secondary_focus: "Turn order interactions and simultaneous action resolution"
        engagement_style: "Read every scoring condition literally, construct scenarios where rules conflict"
        key_questions:
          - "Are all scoring conditions unambiguous in every possible board state?"
          - "What happens when two players take conflicting simultaneous actions?"
          - "Does the turn structure handle all possible player action sequences?"
          - "Are tiebreaker conditions defined for every possible scoring tie?"
      autobattler:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Ability trigger order and simultaneous effect resolution"
        secondary_focus: "Targeting priority ambiguity, AI behavior edge cases"
        engagement_style: "Construct board states where multiple abilities trigger simultaneously, test resolution order"
        key_questions:
          - "Is the order of ability resolution defined for every simultaneous trigger?"
          - "How does targeting priority resolve when multiple valid targets exist?"
          - "Are there board states where the AI behavior produces contradictory actions?"
          - "Does the combat simulation produce consistent results or are there hidden random factors?"
      roguelike:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Item interaction edge cases and status effect stacking"
        secondary_focus: "Proc order ambiguity and undefined item combinations"
        engagement_style: "Combine every item with every other item, test status effect stacking limits"
        key_questions:
          - "Is the proc order defined when multiple items trigger on the same event?"
          - "Do status effects stack, refresh, or override -- and is this consistent?"
          - "Are there item combinations that produce undefined or inconsistent behavior?"
          - "Does the game define what happens when contradictory effects apply simultaneously?"
      deckbuilder:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Card interaction timing and resolution order"
        secondary_focus: "When-played versus ongoing effect ambiguity"
        engagement_style: "Construct hands where multiple card effects interact, test resolution order"
        key_questions:
          - "Is card resolution order defined when multiple effects trigger simultaneously?"
          - "Do 'when played' effects resolve before or after the card's primary effect?"
          - "Are there card combinations that produce undefined game states?"
          - "Does the discard/shuffle timing create ambiguous situations?"
      ccg:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Stack resolution and priority edge cases"
        secondary_focus: "Keyword interaction ambiguity, replacement effect conflicts"
        engagement_style: "Build scenarios with multiple triggered abilities on the stack, test every keyword interaction"
        key_questions:
          - "Is the priority system fully defined for every possible game state?"
          - "How do replacement effects resolve when multiple apply to the same event?"
          - "Are keyword interactions defined for every possible combination?"
          - "What happens when a card references a game state that no longer exists?"
      4x:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Simultaneous turn resolution and diplomatic agreement enforcement"
        secondary_focus: "Combat resolution ambiguity, border case territory control"
        engagement_style: "Construct scenarios where simultaneous actions conflict, test diplomatic rule enforcement"
        key_questions:
          - "How does the game resolve simultaneous conflicting orders?"
          - "Are diplomatic agreements mechanically enforced or merely social contracts?"
          - "What happens when territory control is ambiguous due to simultaneous movement?"
          - "Does the combat system produce consistent results for identical inputs?"
      tactics:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Ability interaction edge cases and targeting ambiguity"
        secondary_focus: "Movement and positioning rules gaps, reaction trigger order"
        engagement_style: "Construct complex board states where multiple abilities interact, test every trigger condition"
        key_questions:
          - "Is the reaction and trigger order fully defined for all possible ability chains?"
          - "How does the game resolve targeting when conditions change mid-ability?"
          - "Are movement rules unambiguous for every possible terrain configuration?"
          - "Do area-of-effect abilities have clearly defined edge cases for partial coverage?"
      social-deduction:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Role interaction edge cases and timing windows"
        secondary_focus: "Simultaneous night action resolution, dead player information access"
        engagement_style: "Construct scenarios with conflicting role abilities, test every edge case in the night phase"
        key_questions:
          - "How do conflicting night actions resolve when targeting each other?"
          - "Are the rules for dead player communication unambiguous?"
          - "Does the game define what happens when a role's target becomes invalid?"
          - "Are voting procedures defined for every possible tie and abstention scenario?"
      cooperative:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Rule ambiguity in enemy AI behavior"
        secondary_focus: "Player communication restrictions and action timing gaps"
        engagement_style: "Test every enemy AI decision point for ambiguity, construct edge cases in player action timing"
        key_questions:
          - "Is the enemy AI decision tree fully deterministic and unambiguous?"
          - "Are communication restrictions between players clearly defined?"
          - "What happens when multiple game effects trigger simultaneously with no defined order?"
          - "Does the difficulty scaling system produce consistent and predictable results?"
      idle:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Offline calculation accuracy and rounding edge cases"
        secondary_focus: "Upgrade interaction conflicts and prestige timing precision"
        engagement_style: "Test math at extreme values, look for rounding errors and overflow conditions"
        key_questions:
          - "Does offline calculation match real-time calculation at all timescales?"
          - "How does the game handle rounding when multiple multipliers stack?"
          - "Are there number overflow or precision issues at extreme progression values?"
          - "Do upgrade descriptions match their actual mathematical implementation?"
      extraction:
