        optimization_drive: medium
        system_engagement: exhaustive
        primary_focus: "Netcode and hit registration ambiguity"
        secondary_focus: "Loot ownership rules, spawn timing edge cases"
        engagement_style: "Test every contested interaction -- simultaneous kills, loot grabs, extraction timing windows"
        key_questions:
          - "How does the game resolve simultaneous actions between players?"
          - "Are loot ownership rules unambiguous when multiple players interact with the same item?"
          - "Is the extraction timing window precisely defined?"
          - "Do damage calculations match stated weapon statistics in all conditions?"
      looter:
        risk_tolerance: low
        optimization_drive: medium
        system_engagement: exhaustive
