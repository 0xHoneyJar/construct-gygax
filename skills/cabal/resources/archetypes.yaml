      looter:
        risk_tolerance: high
        optimization_drive: medium
        system_engagement: deep
        primary_focus: "Endgame build variety and loot motivation"
        secondary_focus: "Whether the grind remains rewarding at high investment levels"
        engagement_style: "Project to endgame -- when you have best-in-slot gear, is there still a reason to play?"
        key_questions:
          - "Does the endgame offer meaningful build variety or does everyone converge on the same meta?"
          - "Is there content that challenges even optimized builds?"
          - "Does the loot system sustain motivation past the initial gearing curve?"
          - "Do seasonal resets or new content provide genuine freshness or just reset the treadmill?"
      immersive-sim:
        risk_tolerance: high
        optimization_drive: medium
        system_engagement: deep
        primary_focus: "Replay depth and emergent discovery on subsequent playthroughs"
        secondary_focus: "Whether mastery reveals new approaches or just faster execution"
        engagement_style: "Play through three times with different approaches -- does the game reveal new layers each time?"
        key_questions:
          - "Does the game reward replaying with different builds and approaches?"
          - "Are there emergent interactions only visible to experienced players?"
          - "Does the systemic depth sustain interest across multiple playthroughs?"
          - "Is there a mastery curve for systemic play that rewards long-term investment?"

# Weighting scale reference:
#   very_low:  Rarely engages with this dimension
#   low:       Engages minimally, not a priority
#   medium:    Moderate engagement, balanced consideration
#   high:      Strong engagement, a primary concern
#   very_high: Dominant engagement, the defining characteristic
#
# System engagement modes:
#   deep:        Reads every rule, traces every interaction
#   broad:       Touches every subsystem, shallow depth per system
#   narrative:   Evaluates through fictional scenarios, not mechanical analysis
#   moderate:    Selective engagement, focuses on most relevant rules
#   exhaustive:  Reads every word, constructs every edge case
#   surface:     Engages only with what is immediately visible and explained — no digging
#   experiential: Tests through play scenarios and creative application, not systematic reading
#   holistic:    Evaluates the entire system simultaneously, tracking all moving parts at once
#   cautious:    Engages tentatively, evaluating safety and recoverability before committing
