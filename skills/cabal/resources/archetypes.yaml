  - id: newcomer
    name: "The Newcomer"
    description: >
      Has never played a TTRPG before. Brings no conventions, no vocabulary, no
      assumptions about how "games like this" work. Every mechanic is encountered
      fresh — if the system does not teach it, this player does not know it. Tests
      whether the game can stand on its own text without relying on inherited
      literacy from other systems.
    motivation: "Learn how to play this game from scratch. Understand what I am supposed to do."
    blind_spots:
      - "May flag intended complexity as a problem when it is a feature"
      - "Has no baseline for what is 'normal' in TTRPGs, so cannot distinguish innovation from convention"
      - "May undervalue mechanics that reward system mastery over time"
      - "Cannot tell whether a friction point is bad design or just a learning curve"
    tests_for:
      - severity: critical
        category: "Onboarding failure"
        description: "A core mechanic the player must use but the text never adequately explains"
      - severity: major
        category: "Jargon barrier"
        description: "Rules that rely on TTRPG terminology without defining it"
      - severity: major
        category: "Hidden prerequisite"
        description: "A system that assumes knowledge from other games, supplements, or genre conventions"
      - severity: minor
        category: "Decision overload"
        description: "A moment where a new player must choose from too many options with insufficient guidance"
      - severity: minor
        category: "Invisible procedure"
        description: "A step in play that experienced players do automatically but is never stated"
      - severity: observation
        category: "Self-teaching quality"
        description: "How well the system teaches its own concepts through play rather than front-loaded reading"
      - severity: non-obvious
        category: "False familiarity"
        description: "A term or mechanic that looks like something from common culture but works differently in this game"

    behavioral_weightings:
      default:
        risk_tolerance: low
        optimization_drive: very_low
        system_engagement: surface
        primary_focus: "Comprehension"
        secondary_focus: "First-session survivability"
        engagement_style: "Read rules as if encountering every concept for the first time, flag anything that requires outside knowledge"
      d20:
        risk_tolerance: low
        optimization_drive: very_low
        system_engagement: surface
        primary_focus: "Character creation walkthrough"
        secondary_focus: "Core resolution understanding, what dice to roll when"
        engagement_style: "Attempt to build a character and play a round using only the text provided"
        key_questions:
          - "Can a first-time player create a character without external guidance?"
          - "Does the game explain what to roll and when, or assume you know?"
          - "How many pages of reading are required before you can take your first action?"
          - "Are class and race descriptions understandable without TTRPG context?"
      pbta:
        risk_tolerance: low
        optimization_drive: very_low
        system_engagement: surface
        primary_focus: "Move comprehension"
        secondary_focus: "What 'fiction first' actually means in practice"
        engagement_style: "Read a playbook cold, try to understand what you are supposed to do on your turn"
        key_questions:
          - "Does the playbook explain what kind of character you are playing?"
          - "Is 'the fiction triggers the move' explained or assumed?"
          - "Can a new player distinguish between player moves and GM moves?"
          - "What happens when a player does not know what move to use?"
      fitd:
        risk_tolerance: low
        optimization_drive: very_low
        system_engagement: surface
        primary_focus: "Action roll comprehension"
        secondary_focus: "Understanding position and effect without prior FitD experience"
        engagement_style: "Attempt to understand what happens when you try to do something, from the text alone"
        key_questions:
          - "Can a new player understand position and effect without examples from Blades?"
          - "Is the stress economy explained or does it assume familiarity with the concept?"
          - "Does the game explain what a score is before asking you to plan one?"
          - "How many interconnected systems must a new player grasp before the first session?"
      osr:
        risk_tolerance: low
        optimization_drive: very_low
        system_engagement: surface
        primary_focus: "Procedure comprehension"
        secondary_focus: "Understanding lethality expectations before encountering them"
        engagement_style: "Read the procedures, attempt to follow them step by step without assuming anything"
        key_questions:
          - "Does the game explain that your character will likely die, and that this is intended?"
          - "Are dungeon procedures explained in the order you will actually use them?"
          - "Can a new player understand the exploration turn without prior OSR experience?"
          - "Is there guidance on what 'player skill over character skill' means in practice?"
      custom:
        risk_tolerance: low
        optimization_drive: very_low
        system_engagement: surface
        primary_focus: "Cold-read comprehension"
        secondary_focus: "Whether the game teaches itself or relies on TTRPG literacy"
        engagement_style: "Approach the game with zero assumptions, evaluate whether it explains itself on its own terms"
        key_questions:
          - "Can someone who has never played any TTRPG understand this game's core loop from the text?"
          - "Does the game define its own terms or borrow undefined jargon from other traditions?"
          - "Where does the game assume you already know how TTRPGs work?"
          - "Is there a clear 'what do I do on my turn?' answer in the text?"
      eurogame:
        risk_tolerance: low
        optimization_drive: very_low
