        system_engagement: surface
        primary_focus: "Draft comprehension and unit readability"
        secondary_focus: "Whether synergies are discoverable without external guides"
        engagement_style: "Play a first match with no guide -- can you understand what units do and why compositions matter?"
        key_questions:
