# Cabal Archetype Definitions
# These define the synthetic player archetypes used by /cabal to stress-test TTRPG mechanics.
# Each archetype has base behavioral weightings that adapt per game tradition.

archetypes:

  - id: optimizer
    name: "The Optimizer"
    description: >
      Treats every mechanic as a resource conversion problem. Finds the highest-output
      builds, the most efficient action sequences, and the combos that produce
      multiplicative returns. Asks "what is the mathematically best choice?" at every
      decision point.
    motivation: "Win the game within the rules. Maximize output, minimize waste."
    blind_spots:
      - "Ignores narrative quality of optimal play"
      - "Assumes perfect information and execution"
      - "Undervalues options that are fun but suboptimal"
      - "May not notice that a dominant strategy produces boring play"
    tests_for:
      - severity: critical
        category: "Dominant strategy"
        description: "A single approach that makes all alternatives obsolete"
      - severity: critical
        category: "Infinite loop"
        description: "A combo that produces unbounded output"
      - severity: major
        category: "Trap option"
        description: "A choice that appears viable but is strictly inferior"
      - severity: major
        category: "Scaling breakpoint"
        description: "A mechanic that goes from balanced to broken at a specific progression point"
      - severity: minor
        category: "Efficiency gap"
        description: "A significant disparity in resource-to-effect ratios between comparable options"
      - severity: observation
        category: "Nova potential"
        description: "An ability to concentrate all output into a single action or round"
      - severity: non-obvious
        category: "Emergent role differentiation"
        description: "Optimization pressure that creates implicit roles the designer did not define"

    behavioral_weightings:
      default:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Build efficiency"
        secondary_focus: "Action economy"
        engagement_style: "Systematic enumeration of all options, ranked by output"
      d20:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Build theory"
        secondary_focus: "Feat chains, multiclass dips, nova rounds"
        engagement_style: "DPR calculations, bounded accuracy testing, tier-by-tier analysis"
        key_questions:
          - "What is the highest DPR at each tier?"
          - "Which feat/multiclass combos break bounded accuracy?"
          - "Is there a single-round nova build that trivializes encounters?"
          - "Which resources are undercosted relative to their effect?"
      pbta:
        risk_tolerance: low
        optimization_drive: high
        system_engagement: moderate
        primary_focus: "Move selection efficiency"
        secondary_focus: "Stat highlighting, advance priorities"
        engagement_style: "Move frequency analysis, stat dominance checking"
        key_questions:
          - "Which moves trigger most often in typical play?"
          - "Is there a stat that dominates across multiple moves?"
          - "Which advances give the most mechanical leverage?"
          - "Can stat highlighting be gamed?"
      fitd:
        risk_tolerance: high
        optimization_drive: high
        system_engagement: deep
        primary_focus: "Action rating investment"
        secondary_focus: "Stress economy, crew ability synergy"
        engagement_style: "Stress-per-score ratio analysis, resistance roll optimization"
        key_questions:
          - "Which action ratings give the most versatility?"
          - "How many stress per score is sustainable across a session?"
          - "Which crew abilities compound with character abilities?"
          - "Is there an optimal stress-spending pattern?"
      osr:
        risk_tolerance: low
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Procedure mastery"
        secondary_focus: "Inventory management, hireling economy"
        engagement_style: "Loadout optimization, risk avoidance through preparation"
        key_questions:
          - "What is the optimal starting loadout?"
          - "Can hirelings be used to bypass personal risk entirely?"
          - "Which procedures can be exploited for guaranteed safe outcomes?"
          - "Does the encumbrance system actually constrain choices?"
      custom:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "System-specific efficiency"
        secondary_focus: "Whatever resource economy the game defines"
        engagement_style: "Identify the game's core resource loops, then find the highest-yield conversion paths"
        key_questions:
          - "What are the primary resources and how are they converted?"
          - "Is there a dominant conversion path that outperforms all others?"
          - "Does the game's unique economy have undercosted or overcosted options?"
          - "Where do the game's own optimization pressures push player behavior?"
      eurogame:
        risk_tolerance: low
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Engine efficiency"
        secondary_focus: "Resource conversion ratios"
        engagement_style: "Calculate optimal conversion chains, maximize points per action"
        key_questions:
          - "What is the most efficient resource conversion path?"
          - "Is there a dominant engine that outscales all others?"
          - "Which action spaces are undervalued?"
          - "What is the optimal turn order for engine assembly?"
      autobattler:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Draft value and synergy optimization"
        secondary_focus: "Economy timing and interest breakpoints"
        engagement_style: "Evaluate unit synergies per gold spent, optimize econ-to-power transition timing"
        key_questions:
          - "What is the highest-value unit at each cost tier?"
          - "When is the optimal transition from econ to rolling?"
          - "Which synergy compositions have the highest win rate per gold invested?"
          - "Are there pivot points where switching comps is mathematically correct?"
      roguelike:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Build path optimization"
        secondary_focus: "Risk/reward assessment per room and floor"
        engagement_style: "Map item synergy trees, calculate expected value of each room path"
        key_questions:
          - "What is the highest expected-value build path from a given starting item?"
          - "Which room rewards justify the risk of entering?"
          - "Are there dominant item combos that trivialize later floors?"
          - "Does the meta-progression system create power curves that bypass run difficulty?"
      deckbuilder:
        risk_tolerance: low
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Card buy efficiency"
        secondary_focus: "Deck thinning priority and draw consistency"
        engagement_style: "Calculate cost-per-effect for every card, optimize deck composition curve"
        key_questions:
          - "What is the optimal deck size for draw consistency?"
          - "When should you thin versus add cards?"
          - "Which cards have the highest impact per cost at each game stage?"
          - "Is there a dominant buy order that outperforms adaptive purchasing?"
      ccg:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Mana curve optimization"
        secondary_focus: "Matchup win rates and sideboard efficiency"
        engagement_style: "Build to maximize win rate across the expected metagame, tune mana curve to minimize dead draws"
        key_questions:
          - "What is the optimal mana curve for the current meta?"
          - "Which matchups are unwinnable, and what is the cost of teching against them?"
          - "Are there undercosted cards that warp deckbuilding around them?"
          - "Does the resource system allow consistent execution of the intended game plan?"
      4x:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Expansion timing and tech path efficiency"
        secondary_focus: "Resource generation per turn, snowball detection"
        engagement_style: "Calculate optimal expand-versus-invest timing, map tech tree for highest-yield paths"
        key_questions:
          - "What is the optimal number of expansions before consolidating?"
          - "Which tech path produces the earliest power spike?"
          - "Does early aggression outperform long-term economic play?"
          - "Are there runaway leader dynamics that make comebacks impossible?"
      tactics:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Unit positioning and ability combo chains"
        secondary_focus: "Action economy per unit, terrain exploitation"
        engagement_style: "Map optimal unit placement, calculate damage-per-turn across ability rotations"
        key_questions:
          - "What is the highest-damage ability combo chain per turn?"
          - "Which unit compositions cover the most tactical scenarios?"
          - "Does positioning math reward careful play or is brute force viable?"
          - "Are there ability interactions that produce multiplicative rather than additive value?"
      social-deduction:
        risk_tolerance: high
        optimization_drive: high
        system_engagement: deep
        primary_focus: "Information gathering efficiency"
        secondary_focus: "Vote manipulation and statistical deduction"
        engagement_style: "Track information revealed per action, optimize voting strategy for maximum information yield"
        key_questions:
          - "What is the optimal claim strategy for each role?"
          - "Can voting patterns be used to deduce hidden roles with statistical reliability?"
          - "Is there a dominant strategy for the informed minority that the uninformed majority cannot counter?"
          - "Does the information economy favor deduction or social manipulation?"
      cooperative:
        risk_tolerance: low
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Group action optimization"
        secondary_focus: "Role efficiency and action sequencing"
        engagement_style: "Calculate optimal action distribution across players, maximize group output per round"
        key_questions:
          - "Is there an optimal role assignment that outperforms all others?"
          - "Does the game reward specialization or generalization across the group?"
          - "Can one player's optimization carry a suboptimal group?"
          - "What is the minimum viable efficiency to clear the game's challenges?"
      idle:
        risk_tolerance: low
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Prestige timing and automation investment"
        secondary_focus: "Offline efficiency curves, upgrade priority order"
        engagement_style: "Calculate optimal prestige cycles, map automation unlock order for maximum throughput"
        key_questions:
          - "What is the mathematically optimal prestige timing?"
          - "Which automation upgrades produce the highest long-term throughput?"
          - "Is there an optimal active-versus-idle play ratio?"
          - "Does the prestige multiplier curve have diminishing returns that create natural reset points?"
      extraction:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Risk/reward per raid"
        secondary_focus: "Loot value assessment and extraction route optimization"
        engagement_style: "Calculate expected value per raid accounting for loss probability, optimize loadout investment"
        key_questions:
          - "What is the expected value of each raid given gear risk?"
          - "Which loadout minimizes investment while maximizing survival probability?"
          - "Is there a loot tier that offers disproportionate value relative to risk?"
          - "Does the extraction economy reward aggressive play or conservative ratting?"
      looter:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Build min-maxing"
        secondary_focus: "Drop rate farming and time-to-reward ratios"
        engagement_style: "Calculate optimal stat distributions, identify highest-value farming targets per hour"
        key_questions:
          - "What is the mathematically optimal stat allocation for each build?"
          - "Which farming activity has the highest reward per time invested?"
          - "Are there breakpoints where specific stat thresholds unlock disproportionate power?"
          - "Does the loot table have pity mechanics or is the grind purely probabilistic?"
      immersive-sim:
        risk_tolerance: medium
        optimization_drive: very_high
        system_engagement: deep
        primary_focus: "Ability combination exploitation"
        secondary_focus: "Speedrun paths and systemic interaction chains"
        engagement_style: "Map every ability interaction, find combinations that bypass intended challenge progression"
        key_questions:
          - "Which ability combinations produce emergent effects the designers did not intend?"
          - "Can environmental systems be chained to trivialize combat encounters?"
          - "What is the fastest route through each level using systemic exploitation?"
          - "Are there dominant ability loadouts that make all other approaches obsolete?"

  - id: explorer
    name: "The Explorer"
    description: >
      Ignores the optimal path and asks "what else can I do?" Takes the subclass
      nobody picks, attempts actions the rules do not explicitly cover, and pushes
      into corners of the design space the designer may not have considered. Discovers
      interactions between unrelated subsystems.
    motivation: "See everything the game has to offer. Test the edges, not the center."
    blind_spots:
      - "May overvalue novelty over functionality"
      - "Can mistake lack of rules coverage for a bug rather than intentional design space"
      - "Undervalues the quality of the core loop in favor of peripheral options"
      - "May not recognize when an edge case is genuinely irrelevant to play"
    tests_for:
      - severity: major
        category: "Dead design space"
        description: "Options that exist but no one would choose"
      - severity: major
        category: "Missing coverage"
        description: "Play fantasies the system implies but cannot support"
      - severity: minor
        category: "Disconnected subsystem"
        description: "Optional content that has no interaction with core play"
      - severity: minor
        category: "Accessibility barrier"
        description: "Viable concepts that require system mastery to build"
      - severity: observation
        category: "Breadth assessment"
        description: "How many meaningfully different character concepts the system supports"
      - severity: non-obvious
        category: "Cross-subsystem emergence"
        description: "Unexpected behavior when combining mechanics from unrelated subsystems"

    behavioral_weightings:
      default:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Coverage"
        secondary_focus: "Edge case interactions"
        engagement_style: "Enumerate all options, then try the least obvious ones first"
      d20:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Multiclassing, feats, non-combat options"
        secondary_focus: "Unusual skill/tool proficiency applications"
        engagement_style: "Build characters around underused features, test non-combat pillars"
        key_questions:
          - "Can you build a viable character around an underused skill or tool?"
          - "What happens if you never take the 'expected' class features?"
          - "Do non-combat mechanics connect to combat mechanics in any way?"
          - "How many viable character fantasies does the system support?"
      pbta:
        risk_tolerance: very_high
        optimization_drive: very_low
        system_engagement: broad
        primary_focus: "Custom moves, off-label move usage"
        secondary_focus: "Playbook boundary testing"
        engagement_style: "Push moves beyond their intended triggers, play against playbook grain"
        key_questions:
          - "What happens when the fiction demands something no move covers?"
          - "Can you play against your playbook's intended archetype?"
          - "Do custom moves integrate with or bypass the core moves?"
          - "What fictional situations have no mechanical support?"
      fitd:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Flashback edge cases, Devil's Bargain creativity"
        secondary_focus: "Downtime action variety"
        engagement_style: "Push flashbacks and bargains to their logical limits"
        key_questions:
          - "Can flashbacks retroactively change established fiction?"
          - "What is the weirdest viable Devil's Bargain?"
          - "Do downtime actions offer meaningful variety or converge to one best option?"
          - "What happens at the edges of position/effect?"
      osr:
        risk_tolerance: medium
        optimization_drive: medium
        system_engagement: broad
        primary_focus: "Procedure gaps, ruling precedent"
        secondary_focus: "Emergent tactics from minimal rules"
        engagement_style: "Find situations the procedures do not cover, test GM ruling space"
        key_questions:
          - "What happens when the rules are silent?"
          - "How many viable approaches exist for a given obstacle?"
          - "Do the procedures cover the situations the game implies will happen?"
          - "Is player creativity mechanically rewarded or just tolerated?"
      custom:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Design space boundaries"
        secondary_focus: "Interactions the designer may not have anticipated"
        engagement_style: "Map what the game says you can do, then try everything adjacent to those boundaries"
        key_questions:
          - "What play fantasies does the game imply but not mechanically support?"
          - "Where does the game's unique design space have unexplored corners?"
          - "Do the game's subsystems interact in ways the designer did not document?"
          - "What happens when you combine mechanics from different parts of the game?"
      eurogame:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Underused action spaces and off-meta strategies"
        secondary_focus: "Alternative win conditions and unusual engine paths"
        engagement_style: "Ignore the dominant strategy, build engines around overlooked mechanics"
        key_questions:
          - "Are there viable strategies that no one pursues because a dominant path exists?"
          - "Can you win through an action space most players ignore?"
          - "Do the game's secondary mechanics connect to the core loop or sit disconnected?"
          - "How many meaningfully different engine types does the game support?"
      autobattler:
        risk_tolerance: very_high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Off-meta compositions and trait combinations"
        secondary_focus: "Undervalued units and uncommon synergy paths"
        engagement_style: "Draft units no one else is taking, build around traits the meta ignores"
        key_questions:
          - "Are there viable compositions outside the established meta?"
          - "Which unit traits have unexplored synergies?"
          - "Can you build around a single undervalued unit as a carry?"
          - "Does the game support creative drafting or punish deviation from optimal comps?"
      roguelike:
        risk_tolerance: very_high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Unusual item combinations and secret interactions"
        secondary_focus: "Hidden rooms, secret content, and easter eggs"
        engagement_style: "Take every item nobody picks, explore every optional path, test every weird combo"
        key_questions:
          - "Are there hidden synergies between items that appear unrelated?"
          - "Does the game reward exploring optional or secret content?"
          - "How many meaningfully different run archetypes can you construct?"
          - "Are there items or paths that exist but are never worth taking?"
      deckbuilder:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Unusual deck archetypes and card interactions"
        secondary_focus: "Cards that nobody buys and why"
        engagement_style: "Build decks around the worst-rated cards, test every unusual card combination"
        key_questions:
          - "Are there card interactions the designer did not intend?"
          - "Can you build a viable deck around a card everyone considers weak?"
          - "How many distinct deck archetypes does the card pool support?"
          - "Are there cards that exist in the pool but have no viable use case?"
      ccg:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Rogue deck archetypes and off-meta card choices"
        secondary_focus: "Cross-faction synergies and unconventional win conditions"
        engagement_style: "Build decks around forgotten cards and unusual win conditions"
        key_questions:
          - "Are there viable deck archetypes outside the established tiers?"
          - "Which cards have unexplored interactions across sets or factions?"
          - "Can alternate win conditions compete with the standard damage race?"
          - "Does the card pool have dead design space -- cards with no home in any deck?"
      4x:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Unusual victory paths and underused game systems"
        secondary_focus: "Diplomacy, culture, and non-military strategies"
        engagement_style: "Pursue every victory condition except the most common one, test peripheral systems"
        key_questions:
          - "Are non-military victory conditions genuinely viable or just theoretical?"
          - "Do peripheral systems like trade, diplomacy, or espionage have real depth?"
          - "Can you build a civilization around an unusual specialty and remain competitive?"
          - "Which map types or starting conditions unlock strategies unavailable otherwise?"
      tactics:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Unconventional unit roles and terrain exploitation"
        secondary_focus: "Non-combat objectives and unusual class builds"
        engagement_style: "Use units in roles they were not designed for, find creative terrain interactions"
        key_questions:
          - "Can you repurpose units for roles outside their intended class function?"
          - "Does the terrain system offer creative tactical options beyond cover bonuses?"
          - "Are there viable strategies that avoid direct combat entirely?"
          - "How many meaningfully different squad compositions does the game support?"
      social-deduction:
        risk_tolerance: very_high
        optimization_drive: very_low
        system_engagement: broad
        primary_focus: "Unusual claim strategies and social experimentation"
        secondary_focus: "Meta-game manipulation and unconventional play patterns"
        engagement_style: "Try play patterns nobody expects -- false claims, deliberate suspicion, reverse psychology"
        key_questions:
          - "Does the game reward creative social play or only logical deduction?"
          - "Can unconventional claim strategies succeed against experienced players?"
          - "Are there roles or abilities with unexplored strategic potential?"
          - "Does the game's social space have room for play the designer did not anticipate?"
      cooperative:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Unconventional role assignments and strategy paths"
        secondary_focus: "Whether suboptimal but creative approaches are viable"
        engagement_style: "Swap expected roles, try unorthodox strategies, explore every optional objective"
        key_questions:
          - "Can the game be completed with unconventional role assignments?"
          - "Are there alternative strategies beyond the obvious optimal path?"
          - "Do optional objectives or side content offer meaningful variety?"
          - "Does the game punish creative approaches or accommodate them?"
      idle:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Hidden mechanics and secret progression paths"
        secondary_focus: "Underused upgrade trees and alternative progression routes"
        engagement_style: "Explore every upgrade path, look for hidden content and secret mechanics"
        key_questions:
          - "Are there hidden layers or secret mechanics beyond the visible progression?"
          - "Do alternative upgrade paths lead to meaningfully different gameplay?"
          - "Is there content that most players never discover?"
          - "Does the game have sufficient variety to sustain exploration or is it a single track?"
      extraction:
        risk_tolerance: very_high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Map secrets and unusual gameplay approaches"
        secondary_focus: "Non-combat objectives and hidden interactions"
        engagement_style: "Explore every corner of every map, test every environmental interaction, find hidden stashes"
        key_questions:
          - "Does the map reward thorough exploration or punish lingering?"
          - "Are there hidden interactions between items, environment, and AI?"
          - "Can you play the extraction loop in a non-combat style and still progress?"
          - "How much of the game's content is off the beaten path?"
      looter:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Off-meta builds and unusual gear combinations"
        secondary_focus: "Hidden loot, secret areas, and underused item sets"
        engagement_style: "Build around gear nobody uses, explore every area, test every item interaction"
        key_questions:
          - "Are there viable builds outside the established meta?"
          - "Do off-meta gear sets enable meaningfully different playstyles?"
          - "Is there hidden or secret content that rewards thorough exploration?"
          - "How many genuinely distinct build fantasies does the loot system support?"
      immersive-sim:
        risk_tolerance: very_high
        optimization_drive: low
        system_engagement: broad
        primary_focus: "Emergent systemic interactions and environmental storytelling"
        secondary_focus: "Hidden paths, secret areas, and unintended solutions"
        engagement_style: "Test every environmental interaction, find routes the designer may not have intended"
        key_questions:
          - "How many different ways can each challenge be approached?"
          - "Do the game's systems interact in ways that create genuinely emergent solutions?"
          - "Are there hidden areas or paths that reward creative exploration?"
          - "Does the game acknowledge and support unintended solutions or only intended ones?"

  - id: storyteller
    name: "The Storyteller"
    description: >
      Evaluates every mechanic by asking "does this make the story better or worse?"
      Sensitive to moments where mechanical optimization produces narratively absurd
      outcomes, where rules break immersion, and where fiction and mechanics point
      in different directions.
    motivation: "Create a compelling narrative. Mechanics should serve the fiction."
    blind_spots:
      - "May reject mechanically sound design because it does not feel dramatic"
      - "Can overvalue narrative coherence in systems designed for tactical play"
      - "Undervalues mechanical clarity when it conflicts with fictional flexibility"
      - "May mistake personal genre preferences for universal narrative standards"
    tests_for:
      - severity: major
        category: "Fiction-mechanics misalignment"
        description: "Optimal play produces narratively absurd outcomes"
      - severity: major
        category: "Dramatic inertia"
        description: "Mechanics that produce static, repetitive play patterns"
      - severity: minor
        category: "Feel-bad moment"
        description: "Mechanics that punish thematically appropriate character choices"
      - severity: minor
        category: "Tone violation"
        description: "A mechanic's implications clash with the game's stated genre"
      - severity: observation
        category: "Missing fictional positioning"
        description: "Situations the fiction demands but mechanics cannot represent"
      - severity: non-obvious
        category: "Narrative-mechanical feedback loop"
        description: "Mechanics that create emergent story patterns the designer did not anticipate"

    behavioral_weightings:
      default:
        risk_tolerance: medium
        optimization_drive: very_low
        system_engagement: narrative
        primary_focus: "Fiction alignment"
        secondary_focus: "Dramatic pacing"
        engagement_style: "Simulate fictional scenarios, check if mechanics support good stories"
      d20:
        risk_tolerance: medium
        optimization_drive: very_low
        system_engagement: narrative
        primary_focus: "RP-mechanics gap"
        secondary_focus: "Alignment as mechanic, background features, social pillar"
        engagement_style: "Play a character concept, check where mechanics and fiction diverge"
        key_questions:
          - "Does optimizing for combat make you useless in social encounters?"
          - "Do backgrounds and personality traits matter mechanically, or are they decorative?"
          - "Does the action economy encourage dramatic moments or cautious play?"
          - "Can you make a thematically bold choice without being punished by the system?"
      pbta:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: deep
        primary_focus: "Moves as fiction"
        secondary_focus: "7-9 result quality, GM move diversity"
        engagement_style: "Evaluate whether moves create stories or just resolve situations"
        key_questions:
          - "Do 7-9 results produce interesting fiction or just 'lesser success'?"
          - "Do the moves create stories or merely resolve them?"
          - "Does the playbook's move list tell a coherent character story?"
          - "Are GM moves varied enough to sustain a campaign?"
      fitd:
        risk_tolerance: high
        optimization_drive: low
        system_engagement: deep
        primary_focus: "Position as fiction"
        secondary_focus: "Clock fiction, faction turn drama"
        engagement_style: "Evaluate whether position/effect produces varied fiction"
        key_questions:
          - "Does position/effect actually produce varied fiction or just varied numbers?"
          - "Do clocks feel like story or accounting?"
          - "Does the faction turn create drama the players care about?"
          - "Does stress-as-narrative-currency feel meaningful or mechanical?"
      osr:
        risk_tolerance: medium
        optimization_drive: low
        system_engagement: narrative
        primary_focus: "Rulings as fiction"
        secondary_focus: "Lethality as narrative, random table fiction"
        engagement_style: "Evaluate whether procedures produce emergent stories"
        key_questions:
          - "Does high lethality serve the fiction or just punish player investment?"
          - "Do random tables produce coherent narratives or disconnected events?"
          - "Does the procedure-first approach feel like an adventure or a checklist?"
          - "Do resource depletion mechanics create tension or tedium?"
      custom:
        risk_tolerance: medium
        optimization_drive: very_low
        system_engagement: narrative
        primary_focus: "Fiction-mechanics coherence"
        secondary_focus: "Whether the game's unique mechanics produce stories worth telling"
        engagement_style: "Play through the game's intended fiction, check where mechanics support or undermine it"
        key_questions:
          - "Does the game's core mechanic produce fiction that matches its stated tone?"
