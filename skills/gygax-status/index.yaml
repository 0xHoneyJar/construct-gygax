slug: gygax-status
name: "Gygax Status"
description: |
  Use this skill IF user invokes /gygax OR asks for status, current state, where they are, or game health.
  Cross-skill synthesis dashboard — reads all reports and surfaces prioritized findings.
version: 2.0.0

triggers:
  - "/gygax"
  - "what's the status"
  - "where am I"
  - "game state summary"
  - "game health"

capabilities:
  model_tier: sonnet
  danger_level: safe
  effort_hint: medium
  downgrade_allowed: true
  execution_hint: sequential
  requires:
    native_runtime: false
    tool_calling: true
    thinking_traces: false
    vision: false

dependencies:
  grimoire_paths:
    - grimoires/gygax/
