slug: lore
name: "Lore"
description: |
  Use this skill IF user invokes /lore OR asks about design patterns, failure modes, or TTRPG design wisdom.
  Produces artifacts to grimoires/gygax/lore-reports/.
version: 1.0.0

triggers:
  - "/lore"
  - "what patterns does this follow"
  - "common failure modes"
  - "design anti-patterns"
  - "TTRPG design wisdom"

capabilities:
  model_tier: sonnet
  danger_level: safe
  effort_hint: medium
  downgrade_allowed: true
  execution_hint: sequential
  requires:
    native_runtime: false
    tool_calling: true
    thinking_traces: false
    vision: false

dependencies:
  grimoire_paths:
    - grimoires/gygax/
