# construct.yaml — Gygax construct pack manifest
# TTRPG systems analyst for the Loa ecosystem
# Validate: yq eval '.' construct.yaml

schema_version: 3

name: "Gygax"
slug: gygax
version: 2.0.0

description: "TTRPG systems analyst — design, balance, and stress-test tabletop RPG mechanics with persistent game-state, scenario-based playtesting, and design experimentation"
short_description: "TTRPG systems analysis and design collaboration"

author: gumibera
license: MIT
type: skill-pack
visibility: public

domain:
  - design

skills:
  - slug: attune
    path: skills/attune
  - slug: homebrew
    path: skills/homebrew
  - slug: augury
    path: skills/augury
  - slug: cabal
    path: skills/cabal
  - slug: lore
    path: skills/lore
  - slug: gygax-status
    path: skills/gygax-status
  - slug: scry
    path: skills/scry

commands:
  - name: attune
    path: commands/attune.md
  - name: homebrew
    path: commands/homebrew.md
  - name: augury
    path: commands/augury.md
  - name: cabal
    path: commands/cabal.md
  - name: lore
    path: commands/lore.md
  - name: gygax
    path: commands/gygax.md
  - name: scry
    path: commands/scry.md

composition_paths:
  writes:
    - grimoires/gygax/game-state/
    - grimoires/gygax/designs/
    - grimoires/gygax/balance-reports/
    - grimoires/gygax/playtest-reports/
    - grimoires/gygax/lore-reports/
    - grimoires/gygax/forks/
    - grimoires/gygax/changelog/
  reads:
    - grimoires/gygax/game-state/    # /augury, /cabal, /scry all ground in current game-state
    - grimoires/gygax/forks/         # /scry compare reads existing fork branches

# Stream signature (cycle 003 distill 2026-05-03)
streams:
  reads:
    - Intent          # user invocation routes scope (/augury combat, /scry "what if X")
    - Operator-Model  # game-state index.yaml + entity manifest = the operator's map of the system under analysis
    - Artifact        # game-state YAML files, rulebooks, repos, source docs ingested via /attune
  writes:
    - Verdict         # balance reports (augury), playtest verdicts (cabal), lore-reports, design judgments
    - Artifact        # game-state files, designs, forks, changelog entries, status dashboards

identity:
  persona: identity/persona.yaml
  expertise: identity/expertise.yaml

hooks:
  post_install: scripts/install.sh

quick_start:
  command: /attune
  description: "Point Gygax at your game — a rulebook, a repo, or just describe what you're building"
