# construct.yaml — Gygax construct pack manifest
# Game systems analyst for the Loa ecosystem
# Validate: yq eval '.' construct.yaml

schema_version: 3

name: "Gygax"
slug: gygax
version: 4.0.0

description: "Game systems analyst — design, balance, playtest, and experiment across 20 traditions (TTRPGs, eurogames, autobattlers, roguelikes, CCGs, and more) with persistent game-state, intent-aware analysis, and 460+ curated design heuristics"
short_description: "Game systems analysis and design collaboration"

author: gumibera
license: MIT
type: skill-pack
visibility: public

domain:
  - design

skills:
  - slug: attune
    path: skills/attune
  - slug: homebrew
    path: skills/homebrew
  - slug: augury
    path: skills/augury
  - slug: cabal
    path: skills/cabal
  - slug: lore
    path: skills/lore
  - slug: gygax-status
    path: skills/gygax-status
  - slug: scry
    path: skills/scry
  - slug: delve
    path: skills/delve

commands:
  - name: attune
    path: commands/attune.md
  - name: homebrew
    path: commands/homebrew.md
  - name: augury
    path: commands/augury.md
  - name: cabal
    path: commands/cabal.md
  - name: lore
    path: commands/lore.md
  - name: gygax
    path: commands/gygax.md
  - name: scry
    path: commands/scry.md
  - name: delve
    path: commands/delve.md

composition_paths:
  writes:
    - grimoires/gygax/game-state/
    - grimoires/gygax/references/
    - grimoires/gygax/learned-lore/
    - grimoires/gygax/designs/
    - grimoires/gygax/balance-reports/
    - grimoires/gygax/playtest-reports/
    - grimoires/gygax/lore-reports/
    - grimoires/gygax/delve-reports/
    - grimoires/gygax/forks/
    - grimoires/gygax/changelog/
  reads: []

identity:
  persona: identity/persona.yaml
  expertise: identity/expertise.yaml

hooks:
  post_install: scripts/install.sh

quick_start:
  command: /attune
  description: "Point Gygax at your game — a rulebook, a repo, or just describe what you're building"
